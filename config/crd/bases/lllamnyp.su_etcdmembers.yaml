---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: etcdmembers.lllamnyp.su
spec:
  group: lllamnyp.su
  names:
    kind: EtcdMember
    listKind: EtcdMemberList
    plural: etcdmembers
    singular: etcdmember
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterName
      name: Cluster
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          EtcdMember represents a single member of an etcd cluster.
          EtcdMember resources are created and deleted by the EtcdCluster controller.
          Users should not create these directly.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              EtcdMemberSpec defines the desired state of a single etcd member.
              Created and managed by the EtcdCluster controller.
            properties:
              bootstrap:
                description: |-
                  Bootstrap indicates this member is part of the initial cluster formation.
                  When true the member starts with --initial-cluster-state=new.
                type: boolean
              clusterName:
                description: ClusterName is the name of the owning EtcdCluster.
                minLength: 1
                type: string
              clusterToken:
                description: |-
                  ClusterToken is the value passed to etcd's --initial-cluster-token.
                  Copied from EtcdCluster.status.clusterToken so all members of a cluster
                  agree, and so changes to the cluster's token derivation rule don't
                  affect already-running members.
                type: string
              dormant:
                description: |-
                  Dormant marks the member as paused. While dormant, the member
                  controller deletes the member's Pod but leaves the PVC in place
                  (the PVC stays owned by this EtcdMember). The cluster controller
                  flips Dormant=true on the surviving member when the user sets
                  EtcdCluster.spec.replicas=0 on a 1-member cluster, and flips it
                  back to false when the user scales up. Re-creating the Pod against
                  the existing PVC lets etcd resume from the existing data dir with
                  the same ClusterID and member ID. While dormant, the member does
                  not count toward the EtcdCluster's `current` replica accounting.
                type: boolean
              initialCluster:
                description: |-
                  InitialCluster is the value passed to etcd's --initial-cluster flag.
                  Set by the cluster controller at creation time.
                type: string
              storage:
                anyOf:
                - type: integer
                - type: string
                description: Storage is the PVC size for this member's data directory.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
              version:
                description: Version is the etcd version for this member.
                pattern: ^\d+\.\d+\.\d+$
                type: string
            required:
            - clusterName
            - clusterToken
            - initialCluster
            - storage
            - version
            type: object
          status:
            description: EtcdMemberStatus defines the observed state of a single etcd
              member.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the member's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              memberID:
                description: |-
                  MemberID is the etcd-assigned member ID in hex (e.g. "ae36f238164a08ad"),
                  set once the member joins the cluster. Stored as a string because uint64
                  values can exceed JSON's safe integer range.
                type: string
              podName:
                description: PodName is the name of the Pod running this member.
                type: string
              pvcName:
                description: PVCName is the name of the PersistentVolumeClaim for
                  this member's data.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
