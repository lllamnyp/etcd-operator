---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: etcdclusters.lllamnyp.su
spec:
  group: lllamnyp.su
  names:
    kind: EtcdCluster
    listKind: EtcdClusterList
    plural: etcdclusters
    singular: etcdcluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .spec.replicas
      name: Replicas
      type: integer
    - jsonPath: .status.readyMembers
      name: Ready
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: EtcdCluster is the Schema for the etcdclusters API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              EtcdClusterSpec defines the desired state of an etcd cluster.

              CEL validation rules (k8s 1.29+ apiserver-enforced; both
              CustomResourceValidationExpressions and the quantity() extension
              are GA in 1.29):

                - StorageMedium=Memory + Replicas=0 wedges the cluster on resume
                  (the dormant flip deletes the Pod and the tmpfs goes with it but
                  the resume path treats the member as if its data were preserved).
                  Reject the combination outright; recreate is the only safe path.

                - StorageMedium=Memory requires Storage > 0. Without a SizeLimit the
                  tmpfs is unbounded against node memory, which defeats the whole
                  point of opting into memory backing.
            properties:
              progressDeadlineSeconds:
                default: 600
                description: |-
                  ProgressDeadlineSeconds bounds the time the operator spends trying to
                  reach a desired state before abandoning the in-flight target and
                  adopting whatever the user has set as the new spec. Defaults to 600
                  (10 minutes). A patch to status.progressDeadline can shorten this for
                  a stuck reconcile (set it to "now" to abort immediately).
                format: int32
                minimum: 1
                type: integer
              replicas:
                default: 3
                description: |-
                  Replicas is the desired number of cluster members. Should be odd.
                  A value of 0 parks the cluster ("scale to zero"): the operator
                  flips spec.dormant=true on the surviving EtcdMember, which causes
                  the member controller to delete that member's Pod. The EtcdMember
                  CR and its PVC are preserved (the PVC stays owned by the same
                  EtcdMember across the pause). Scaling back up to >=1 flips
                  spec.dormant=false on the same member; etcd resumes from its
                  existing data dir with the same ClusterID and member ID.
                format: int32
                minimum: 0
                type: integer
              storage:
                anyOf:
                - type: integer
                - type: string
                default: 1Gi
                description: |-
                  Storage is the requested size per member for the etcd data directory.
                  For StorageMedium="" (PVC) this is the PVC's requested capacity backed by
                  the default StorageClass. For StorageMedium="Memory" this is the tmpfs
                  emptyDir's SizeLimit.

                  Shrinking is rejected on UPDATE: PVCs cannot shrink and tmpfs SizeLimit
                  reduction does not free already-allocated memory.
                pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                x-kubernetes-int-or-string: true
                x-kubernetes-validations:
                - message: spec.storage cannot be shrunk
                  rule: quantity(string(self)).compareTo(quantity(string(oldSelf)))
                    >= 0
              storageMedium:
                default: ""
                description: |-
                  StorageMedium selects the volume backend for each member's data
                  directory. Empty string (the default) means a PVC; "Memory" means a
                  tmpfs emptyDir whose lifetime is bound to the Pod. See the
                  StorageMedium type doc for the operational trade-offs.

                  Immutable: changing the medium on an existing cluster would orphan the
                  previous PVC (or tmpfs) and the rolling-migrate path is not implemented.
                  Pausing a memory-backed cluster (Replicas=0 + Memory) is rejected by
                  the EtcdClusterSpec-level CEL rules above — the tmpfs evaporates with
                  the Pod and resume would silently produce an empty data dir.

                  The default ("") is set explicitly (rather than relying on Go's zero
                  value) so the apiserver always stores the field on Create. This makes
                  `oldSelf` present on Update, which the CEL transition rule below
                  requires — without the default, a first-time set from absent → Memory
                  would slip past the immutability check.
                enum:
                - ""
                - Memory
                type: string
                x-kubernetes-validations:
                - message: spec.storageMedium is immutable; delete and recreate the
                    cluster to change the storage backend
                  rule: self == oldSelf
              tls:
                description: |-
                  TLS configures transport-layer security for the etcd client and
                  peer APIs. Absent means plaintext on both surfaces. The whole
                  subtree is immutable post-create — the immutability rules live at
                  the EtcdClusterSpec level (above) because pointer-field transition
                  rules don't fire when the field is being added (nil → set) and we
                  want to reject that direction too.
                properties:
                  client:
                    description: |-
                      Client configures TLS for the etcd client API (port 2379). Absent
                      means plaintext. See ClientTLS for the mTLS-toggle semantics.
                    properties:
                      operatorClientSecretRef:
                        description: |-
                          OperatorClientSecretRef points at a Secret in the cluster's
                          namespace holding the operator's etcd-client identity (tls.crt,
                          tls.key). Setting this enables mTLS — etcd is started with
                          --client-cert-auth=true and the operator presents this cert when
                          dialing. Leaving it unset selects server-TLS-only mode.
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                      serverSecretRef:
                        description: |-
                          ServerSecretRef points at a Secret in the cluster's namespace
                          holding the etcd server cert in the standard kubernetes.io/tls
                          shape: tls.crt, tls.key, and ca.crt. ca.crt is always required
                          (the operator's own etcd client needs it to verify the server,
                          and when mTLS is on it doubles as --trusted-ca-file).
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                    required:
                    - serverSecretRef
                    type: object
                  peer:
                    description: |-
                      Peer configures TLS for the etcd peer API (port 2380). Absent
                      means plaintext. When set, peer is always mTLS — etcd's peer mesh
                      is symmetric and there is no useful encrypt-only-no-identity mode
                      for it.
                    properties:
                      secretRef:
                        description: |-
                          SecretRef points at a Secret in the cluster's namespace holding
                          the peer cert+key in the standard kubernetes.io/tls shape:
                          tls.crt, tls.key, ca.crt. ca.crt is required (peer is symmetric
                          — same cert is used to serve inbound and dial outbound peer
                          connections — and --peer-trusted-ca-file is always populated).
                          The peer cert MUST carry both serverAuth and clientAuth in EKU.
                        properties:
                          name:
                            default: ""
                            description: |-
                              Name of the referent.
                              This field is effectively required, but due to backwards compatibility is
                              allowed to be empty. Instances of this type with an empty value here are
                              almost certainly wrong.
                              More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                            type: string
                        type: object
                        x-kubernetes-map-type: atomic
                    required:
                    - secretRef
                    type: object
                type: object
              version:
                description: Version is the desired etcd version (e.g. "3.5.17").
                pattern: ^\d+\.\d+\.\d+$
                type: string
            required:
            - version
            type: object
            x-kubernetes-validations:
            - message: 'spec.replicas=0 with spec.storageMedium=Memory is unsupported:
                pausing a memory-backed cluster wedges on resume. Delete and recreate
                the cluster instead.'
              rule: '!(has(self.replicas) && self.replicas == 0 && has(self.storageMedium)
                && self.storageMedium == ''Memory'')'
            - message: spec.storage must be > 0 when spec.storageMedium=Memory (the
                tmpfs sizeLimit cannot be zero).
              rule: '!(has(self.storageMedium) && self.storageMedium == ''Memory'')
                || quantity(string(self.storage)).isGreaterThan(quantity(''0''))'
            - message: spec.tls cannot be added to or removed from an existing cluster;
                delete and recreate
              rule: has(self.tls) == has(oldSelf.tls)
            - message: spec.tls is immutable post-create; delete and recreate the
                cluster to change TLS configuration
              rule: '!has(self.tls) || !has(oldSelf.tls) || self.tls == oldSelf.tls'
          status:
            description: EtcdClusterStatus defines the observed state of an etcd cluster.
            properties:
              brokenMembers:
                description: |-
                  BrokenMembers is the count of members the operator considers broken.
                  While the auto-replacement predicate is a stub it is always 0; surfaced
                  here so the predicate has a tested call site and the field already
                  exists when the policy lands.
                format: int32
                type: integer
              clusterID:
                description: |-
                  ClusterID is the etcd cluster ID in hex (e.g. "769f1c9e0d723d0b"),
                  set after initial bootstrap. Stored as a string because uint64 values
                  can exceed JSON's safe integer range.
                type: string
              clusterToken:
                description: |-
                  ClusterToken is the value passed to etcd's --initial-cluster-token,
                  recorded at bootstrap. Reused for all subsequent scale-up operations
                  so existing clusters keep their original token even if the derivation
                  rule changes in a later release.
                type: string
              conditions:
                description: Conditions represent the latest available observations
                  of the cluster's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observed:
                description: |-
                  Observed is the locked-in desired state the operator is currently
                  reconciling toward. The reconciler ignores spec changes while a target
                  is in flight; Observed is only updated from spec when the current
                  target is met or its deadline has expired. nil before the first
                  reconcile.
                properties:
                  replicas:
                    description: Replicas is the locked target replica count.
                    format: int32
                    type: integer
                  storage:
                    anyOf:
                    - type: integer
                    - type: string
                    description: Storage is the locked target data-directory size.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  storageMedium:
                    description: |-
                      StorageMedium is the locked target storage backend. The locking
                      pattern prevents a mid-flight medium flip from being honoured until
                      the current target is reached or its deadline expires.
                    enum:
                    - ""
                    - Memory
                    type: string
                  version:
                    description: Version is the locked target etcd version.
                    type: string
                required:
                - replicas
                - storage
                - version
                type: object
              progressDeadline:
                description: |-
                  ProgressDeadline is the time at which the in-flight reconciliation
                  will be abandoned in favor of the latest spec. Cleared when the
                  cluster reaches Observed. Patch this to a time in the past to abort
                  a stuck reconcile.
                format: date-time
                type: string
              readyMembers:
                description: ReadyMembers is the count of members that are healthy
                  and serving.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
